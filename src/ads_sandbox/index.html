<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapVault Sponsor Sandbox</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, #fff2d6, transparent 45%),
          linear-gradient(135deg, #0f172a, #1e293b 55%, #334155);
        color: #e2e8f0;
      }

      .sandbox-root {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 12px;
        box-sizing: border-box;
      }

      .sponsor-card {
        width: 100%;
        max-width: 320px;
        padding: 16px;
        box-sizing: border-box;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.22);
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.28);
      }

      .sponsor-card[data-hidden="true"] {
        display: none;
      }

      .sponsor-label {
        margin: 0 0 10px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #fbbf24;
      }

      .sponsor-name {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
      }

      .sponsor-tagline {
        margin: 10px 0 0;
        font-size: 13px;
        line-height: 1.45;
        color: #cbd5e1;
      }

      .sponsor-cta {
        display: inline-flex;
        margin-top: 14px;
        padding: 9px 14px;
        border-radius: 999px;
        background: linear-gradient(135deg, #f59e0b, #fb7185);
        color: #0f172a;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="sandbox-root">
      <article class="sponsor-card" data-hidden="true">
        <p class="sponsor-label">Sponsor</p>
        <h1 class="sponsor-name"></h1>
        <p class="sponsor-tagline"></p>
        <a
          class="sponsor-cta"
          target="_blank"
          rel="noreferrer noopener"
        ></a>
      </article>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
